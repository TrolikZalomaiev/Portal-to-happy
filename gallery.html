<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш портал в счастье ❤️</title>
    <!-- Подключаем виджет Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
        }

        .nav-box {
            max-width: 950px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            animation: fadeIn 1s ease-out;
        }

        .btn-back {
            color: #ff4b6e;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            transition: all 0.2s ease;
        }

        .btn-upload {
            background: #ff4b6e;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 15px;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 110, 0.3);
            transition: all 0.2s ease;
        }

        .btn-upload:hover {
            background: #ff2a55;
            transform: scale(1.03);
        }

        h2 {
            font-size: 28px;
            color: #4a4a4a;
            margin-bottom: 35px;
            font-weight: 700;
            animation: fadeIn 1.2s ease-out;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 950px;
            width: 100%;
            animation: fadeIn 1.5s ease-out;
            padding-bottom: 40px;
        }

        .photo-wrapper {
            position: relative;
            background: white;
            padding: 12px 12px 18px 12px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            transform: rotate(var(--rotation, 0deg));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
        }

        .photo-wrapper:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 20px 40px rgba(255, 75, 110, 0.18);
            z-index: 10;
        }

        .photo-wrapper img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #f9f9f9;
        }

        /* Текстовая подпись под фото */
        .photo-caption {
            margin-top: 12px;
            font-size: 15px;
            color: #555;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-word;
            padding: 0 5px;
        }

        /* Кнопка удаления */
        .btn-delete {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .btn-delete:hover {
            background: #ff4b6e;
            color: white;
            transform: scale(1.1);
        }

        .photo-wrapper:nth-child(odd) { --rotation: -2.5deg; }
        .photo-wrapper:nth-child(even) { --rotation: 2.5deg; }
        .photo-wrapper:nth-child(3n) { --rotation: 1.5deg; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="nav-box">
        <a href="index.html" class="btn-back">← Главная</a>
        <button id="upload_widget" class="btn-upload">➕ Добавить фото</button>
    </div>

    <h2>Кусочки нашего счастья ✨</h2>

    <div class="gallery" id="gallery"></div>

    <script>
        const CLOUD_NAME = "e6dgp4jb"; 
        const UPLOAD_PRESET = "yzxssnes";

        const BASE_FIREBASE_URL = "https://portal-to-happy-default-rtdb.europe-west1.firebasedatabase.app/photos";

        const gallery = document.getElementById('gallery');
        let renderedKeys = new Set();

        function renderPhoto(key, url, caption = '') {
            if (renderedKeys.has(key)) return;
            renderedKeys.add(key);

            const wrapper = document.createElement('div');
            wrapper.className = 'photo-wrapper';
            wrapper.id = `photo-${key}`;
            
            const photo = document.createElement('img');
            photo.src = url;
            photo.alt = caption || 'Наш момент';
            photo.loading = 'lazy';

            // Кнопка удаления
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.title = 'Удалить фото';
            deleteBtn.onclick = () => deletePhoto(key);

            wrapper.appendChild(photo);
            wrapper.appendChild(deleteBtn);

            // Если есть подпись, выводим её под карточкой
            if (caption && caption.trim() !== '') {
                const captionDiv = document.createElement('div');
                captionDiv.className = 'photo-caption';
                captionDiv.innerText = caption;
                wrapper.appendChild(captionDiv);
            }

            gallery.prepend(wrapper);
        }

        // Удаление из базы
        async function deletePhoto(key) {
            if (confirm("Точно удалить это фото из галереи?")) {
                try {
                    await fetch(`${BASE_FIREBASE_URL}/${key}.json`, {
                        method: 'DELETE'
                    });
                    const card = document.getElementById(`photo-${key}`);
                    if (card) card.remove();
                    renderedKeys.delete(key);
                } catch (e) {
                    alert("Ошибка при удалении!");
                }
            }
        }

        // Загрузка фото из Firebase
        async function loadPhotos() {
            try {
                const response = await fetch(`${BASE_FIREBASE_URL}.json`);
                const data = await response.json();
                if (data) {
                    Object.entries(data).forEach(([key, item]) => {
                        if (item && item.url) renderPhoto(key, item.url, item.caption || '');
                    });
                }
            } catch (e) {
                console.error("Ошибка загрузки:", e);
            }
        }

        // Сохранение нового фото с подписью
        async function savePhotoToFirebase(url, caption) {
            try {
                const res = await fetch(`${BASE_FIREBASE_URL}.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: url, 
                        caption: caption,
                        timestamp: Date.now() 
                    })
                });
                const data = await res.json();
                if (data && data.name) {
                    renderPhoto(data.name, url, caption);
                }
            } catch (e) {
                console.error("Ошибка сохранения:", e);
            }
        }

        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'camera'],
            multiple: false,
            styles: {
                palette: {
                    window: "#FFFFFF",
                    windowBorder: "#FF4B6E",
                    tabIcon: "#FF4B6E",
                    menuBg: "#FFFFFF",
                    link: "#FF4B6E",
                    action: "#FF4B6E",
                    inactiveTabIcon: "#CCCCCC",
                    error: "#F44236",
                    inProgress: "#0078FF",
                    complete: "#20B832",
                    sourceBg: "#FFF5F7"
                }
            }
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const imageUrl = result.info.secure_url;
                
                // Запрашиваем подпись у пользователя сразу после загрузки
                setTimeout(() => {
                    const userCaption = prompt("Добавь подпись к этой фотографии (или оставь пустым):", "");
                    savePhotoToFirebase(imageUrl, userCaption || '');
                }, 500);
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function(){
            myWidget.open();
        }, false);

        loadPhotos();
    </script>

</body>
</html>
