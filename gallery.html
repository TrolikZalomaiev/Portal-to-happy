<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш портал в счастье ❤️</title>
    <!-- Подключаем виджет загрузки Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
        }

        .nav-box {
            max-width: 950px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            animation: fadeIn 1s ease-out;
        }

        .btn-back {
            color: #ff4b6e;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            transition: all 0.2s ease;
        }

        .btn-upload {
            background: #ff4b6e;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 15px;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 110, 0.3);
            transition: all 0.2s ease;
        }

        .btn-upload:hover {
            background: #ff2a55;
            transform: scale(1.03);
        }

        h2 {
            font-size: 28px;
            color: #4a4a4a;
            margin-bottom: 35px;
            font-weight: 700;
            animation: fadeIn 1.2s ease-out;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 950px;
            width: 100%;
            animation: fadeIn 1.5s ease-out;
            padding-bottom: 40px;
        }

        .photo-wrapper {
            background: white;
            padding: 12px 12px 28px 12px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            transform: rotate(var(--rotation, 0deg));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .photo-wrapper:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 20px 40px rgba(255, 75, 110, 0.18);
            z-index: 10;
        }

        .photo-wrapper img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #f9f9f9;
        }

        .photo-wrapper:nth-child(odd) { --rotation: -2.5deg; }
        .photo-wrapper:nth-child(even) { --rotation: 2.5deg; }
        .photo-wrapper:nth-child(3n) { --rotation: 1.5deg; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="nav-box">
        <a href="index.html" class="btn-back">← Главная</a>
        <button id="upload_widget" class="btn-upload">➕ Добавить фото</button>
    </div>

    <h2>Кусочки нашего счастья ✨</h2>

    <div class="gallery" id="gallery"></div>

    <script>
        const CLOUD_NAME = "e6dgp4jb"; 
        const UPLOAD_PRESET = "yzxssnes";

        const gallery = document.getElementById('gallery');

        function addPhotoToGallery(url) {
            const wrapper = document.createElement('div');
            wrapper.className = 'photo-wrapper';
            
            const photo = document.createElement('img');
            photo.src = url;
            photo.alt = 'Наш момент';
            photo.loading = 'lazy';

            wrapper.appendChild(photo);
            gallery.prepend(wrapper);
        }

        function loadSavedPhotos() {
            const saved = JSON.parse(localStorage.getItem('our_photos') || '[]');
            saved.forEach(url => addPhotoToGallery(url));
        }

        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'camera'],
            multiple: false,
            styles: {
                palette: {
                    window: "#FFFFFF",
                    windowBorder: "#FF4B6E",
                    tabIcon: "#FF4B6E",
                    menuBg: "#FFFFFF",
                    link: "#FF4B6E",
                    action: "#FF4B6E",
                    inactiveTabIcon: "#CCCCCC",
                    error: "#F44236",
                    inProgress: "#0078FF",
                    complete: "#20B832",
                    sourceBg: "#FFF5F7"
                }
            }
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                const imageUrl = result.info.secure_url;
                
                const saved = JSON.parse(localStorage.getItem('our_photos') || '[]');
                saved.push(imageUrl);
                localStorage.setItem('our_photos', JSON.stringify(saved));

                addPhotoToGallery(imageUrl);
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function(){
            myWidget.open();
        }, false);

        loadSavedPhotos();
    </script>

</body>
</html>
