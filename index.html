<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 75, 110, 0.15);
            max-width: 90%;
            width: 420px;
            animation: fadeIn 1.5s ease-out;
        }

        .heart {
            font-size: 60px;
            color: #ff4b6e;
            margin-bottom: 20px;
            display: inline-block;
            animation: heartbeat 1.2s infinite ease-in-out;
        }

        h1 {
            font-size: 26px;
            color: #4a4a4a;
            line-height: 1.5;
            font-weight: 600;
            margin-bottom: 35px;
        }

        .accent {
            color: #ff4b6e;
            display: block;
            margin-top: 10px;
            font-weight: 700;
        }

        .btn-gallery {
            display: inline-block;
            background: linear-gradient(135deg, #ff4b6e 0%, #ff2a55 100%);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 5px 20px rgba(255, 75, 110, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .btn-gallery:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 75, 110, 0.5);
        }

        .btn-gallery:active {
            transform: translateY(-1px);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.12); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>Обожаю тебя,<br><span class="accent">Спасибо, что делаешь меня счастливым❣️</span></h1>
        
        <a href="gallery.html" class="btn-gallery">Портал в счастье ✨</a>
    </div>

</body>
</html>
